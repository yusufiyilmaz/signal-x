<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signal-X | Ag Guvenlik Denetcisi</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0f; color: #e0e0e0; font-family: 'Courier New', monospace; }
        .header { background: #0d1117; border-bottom: 1px solid #00ff88; padding: 20px 40px; display: flex; align-items: center; gap: 15px; }
        .logo { color: #00ff88; font-size: 24px; font-weight: bold; }
        .version { color: #666; font-size: 12px; }
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .card { background: #0d1117; border: 1px solid #1e3a2f; border-radius: 8px; padding: 24px; margin-bottom: 24px; }
        .card h2 { color: #00ff88; margin-bottom: 16px; font-size: 16px; }
        .form-row { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
        input { background: #161b22; border: 1px solid #30363d; color: #e0e0e0; padding: 10px 14px; border-radius: 6px; font-family: monospace; flex: 1; min-width: 150px; }
        input:focus { outline: none; border-color: #00ff88; }
        button { background: #00ff88; color: #0a0a0f; border: none; padding: 10px 24px; border-radius: 6px; font-weight: bold; cursor: pointer; font-family: monospace; }
        button:hover { background: #00cc6a; }
        button:disabled { background: #1e3a2f; color: #666; cursor: not-allowed; }
        .score { display: inline-block; padding: 4px 12px; border-radius: 4px; font-weight: bold; font-size: 20px; }
        .score-A { background: #1a4731; color: #00ff88; }
        .score-B { background: #1a3a1a; color: #4caf50; }
        .score-C { background: #3a3a1a; color: #ffeb3b; }
        .score-D { background: #3a2a1a; color: #ff9800; }
        .score-E, .score-F { background: #3a1a1a; color: #f44336; }
        table { width: 100%; border-collapse: collapse; margin-top: 12px; }
        th { background: #161b22; color: #00ff88; padding: 10px; text-align: left; font-size: 12px; }
        td { padding: 10px; border-bottom: 1px solid #1e3a2f; font-size: 13px; }
        tr:hover td { background: #161b22; }
        .status { padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .open { background: #1a4731; color: #00ff88; }
        .alive { background: #1a4731; color: #00ff88; }
        pre { background: #161b22; padding: 16px; border-radius: 6px; overflow-x: auto; font-size: 12px; line-height: 1.6; margin-top: 12px; }
        .loading { color: #00ff88; animation: blink 1s infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
        .tab { padding: 8px 20px; border-radius: 6px; cursor: pointer; border: 1px solid #30363d; background: #161b22; color: #666; }
        .tab.active { border-color: #00ff88; color: #00ff88; }
        .panel { display: none; }
        .panel.active { display: block; }
        .info-row { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 16px; }
        .info-box { background: #161b22; border: 1px solid #1e3a2f; border-radius: 6px; padding: 12px 20px; flex: 1; min-width: 150px; }
        .info-box .label { color: #666; font-size: 11px; margin-bottom: 4px; }
        .info-box .value { color: #e0e0e0; font-size: 16px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <div class="logo">⚡ Signal-X</div>
            <div class="version">Otomatik Ag Guvenlik Denetcisi v1.0.0</div>
        </div>
    </div>

    <div class="container">
        <div class="tabs">
            <div class="tab active" onclick="switchTab('port')">Port Tarama</div>
            <div class="tab" onclick="switchTab('network')">Ag Keşfi</div>
            <div class="tab" onclick="switchTab('report')">Rapor</div>
        </div>

        <!-- PORT TARAMA -->
        <div id="port" class="panel active">
            <div class="card">
                <h2>🔍 Port Tarama</h2>
                <div class="form-row">
                    <input id="target" placeholder="Hedef IP (orn: 192.168.1.1)" />
                    <input id="startPort" type="number" placeholder="Baslangic Port" value="1" />
                    <input id="endPort" type="number" placeholder="Bitis Port" value="1024" />
                    <button id="scanBtn" onclick="startScan()">Tara</button>
                </div>
            </div>

            <div id="scanResults" style="display:none">
                <div class="info-row">
                    <div class="info-box">
                        <div class="label">HEDEF</div>
                        <div class="value" id="resTarget">-</div>
                    </div>
                    <div class="info-box">
                        <div class="label">ISLETIM SISTEMI</div>
                        <div class="value" id="resOS">-</div>
                    </div>
                    <div class="info-box">
                        <div class="label">GUVENLIK PUANI</div>
                        <div class="value" id="resScore">-</div>
                    </div>
                    <div class="info-box">
                        <div class="label">ACIK PORT</div>
                        <div class="value" id="resPortCount">-</div>
                    </div>
                </div>

                <div class="card">
                    <h2>Acik Portlar</h2>
                    <table>
                        <thead><tr><th>Port</th><th>Servis</th><th>Durum</th></tr></thead>
                        <tbody id="portTable"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- AG KESFI -->
        <div id="network" class="panel">
            <div class="card">
                <h2>🌐 Ag Keşfi</h2>
                <div class="form-row">
                    <input id="baseIP" placeholder="Ag adresi (orn: 192.168.1)" />
                    <input id="startIP" type="number" placeholder="Baslangic" value="1" />
                    <input id="endIP" type="number" placeholder="Bitis" value="254" />
                    <button id="netBtn" onclick="startNetScan()">Tara</button>
                </div>
            </div>
            <div id="netResults" style="display:none">
                <div class="card">
                    <h2>Bulunan Cihazlar</h2>
                    <table>
                        <thead><tr><th>IP Adresi</th><th>Durum</th></tr></thead>
                        <tbody id="netTable"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- RAPOR -->
        <div id="report" class="panel">
            <div class="card">
                <h2>📄 Markdown Rapor</h2>
                <pre id="reportContent">Henuz tarama yapilmadi.</pre>
                <button onclick="copyReport()" style="margin-top:12px">Kopyala</button>
            </div>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tab).classList.add('active');
        }

        async function startScan() {
            const target = document.getElementById('target').value.trim();
            const startPort = parseInt(document.getElementById('startPort').value);
            const endPort = parseInt(document.getElementById('endPort').value);

            if (!target) { alert('IP adresi girin!'); return; }

            const btn = document.getElementById('scanBtn');
            btn.disabled = true;
            btn.textContent = 'Taraniyor...';
            btn.classList.add('loading');

            try {
                const res = await fetch('/api/scan', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ target, start_port: startPort, end_port: endPort })
                });
                const data = await res.json();

                document.getElementById('scanResults').style.display = 'block';
                document.getElementById('resTarget').textContent = data.target;
                document.getElementById('resOS').textContent = data.os_guess;
                document.getElementById('resPortCount').textContent = data.open_ports.length;

                const scoreEl = document.getElementById('resScore');
                scoreEl.innerHTML = `<span class="score score-${data.security_score}">${data.security_score}</span>`;

                const tbody = document.getElementById('portTable');
                tbody.innerHTML = '';
                if (data.open_ports.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3">Acik port bulunamadi.</td></tr>';
                } else {
                    data.open_ports.forEach(p => {
                        tbody.innerHTML += `<tr>
                            <td>${p.port}</td>
                            <td>${p.service || '-'}</td>
                            <td><span class="status open">ACIK</span></td>
                        </tr>`;
                    });
                }

                document.getElementById('reportContent').textContent = data.report_md;

            } catch (e) {
                alert('Hata: ' + e.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Tara';
                btn.classList.remove('loading');
            }
        }

        async function startNetScan() {
            const baseIP = document.getElementById('baseIP').value.trim();
            const start = parseInt(document.getElementById('startIP').value);
            const end = parseInt(document.getElementById('endIP').value);

            if (!baseIP) { alert('Ag adresi girin!'); return; }

            const btn = document.getElementById('netBtn');
            btn.disabled = true;
            btn.textContent = 'Taraniyor...';

            try {
                const res = await fetch('/api/network', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ base_ip: baseIP, start, end })
                });
                const data = await res.json();

                document.getElementById('netResults').style.display = 'block';
                const tbody = document.getElementById('netTable');
                tbody.innerHTML = '';
                if (data.devices.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="2">Aktif cihaz bulunamadi.</td></tr>';
                } else {
                    data.devices.forEach(d => {
                        tbody.innerHTML += `<tr>
                            <td>${d.ip}</td>
                            <td><span class="status alive">AKTIF</span></td>
                        </tr>`;
                    });
                }
            } catch (e) {
                alert('Hata: ' + e.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Tara';
            }
        }

        function copyReport() {
            const text = document.getElementById('reportContent').textContent;
            navigator.clipboard.writeText(text);
            alert('Rapor kopyalandi!');
        }
    </script>
</body>
</html>
