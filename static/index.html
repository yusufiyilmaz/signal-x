<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signal-X | Ağ Güvenlik Denetim Aracı</title>
    <style>
        /* === CSS DEĞİŞKENLERİ VE TEMALAR === */
        :root[data-theme="dark"] {
            --bg-main: #0f172a; --bg-sec: #1e293b; --text-main: #f8fafc;
            --accent-1: #3b82f6; --accent-2: #10b981; --border: #334155;
            --terminal-bg: #000000; --terminal-text: #22c55e;
        }
        :root[data-theme="light"] {
            --bg-main: #f8fafc; --bg-sec: #ffffff; --text-main: #0f172a;
            --accent-1: #2563eb; --accent-2: #059669; --border: #cbd5e1;
            --terminal-bg: #1e293b; --terminal-text: #4ade80;
        }
        :root[data-theme="hacker"] {
            --bg-main: #0a0a0a; --bg-sec: #111111; --text-main: #00ff00;
            --accent-1: #00cc00; --accent-2: #008800; --border: #003300;
            --terminal-bg: #000000; --terminal-text: #00ff00;
        }
        :root[data-theme="cyberpunk"] {
            --bg-main: #2b0a3d; --bg-sec: #120428; --text-main: #f0f0f0;
            --accent-1: #f000ff; --accent-2: #00f0ff; --border: #ff0055;
            --terminal-bg: #05010f; --terminal-text: #f000ff;
        }
        :root[data-theme="ocean"] {
            --bg-main: #001f3f; --bg-sec: #003366; --text-main: #e0f7fa;
            --accent-1: #00bcd4; --accent-2: #009688; --border: #00509e;
            --terminal-bg: #001122; --terminal-text: #4dd0e1;
        }

        /* === GENEL YAPILANDIRMA === */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); transition: all 0.3s ease; display: flex; height: 100vh; overflow: hidden; }
        
        /* === SIDEBAR (Hızlı Erişim Portları) === */
        #sidebar { width: 250px; background: var(--bg-sec); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; }
        #sidebar h2 { font-size: 1.2rem; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .port-btn { background: transparent; color: var(--text-main); border: 1px solid var(--border); padding: 10px; margin-bottom: 8px; cursor: pointer; text-align: left; border-radius: 5px; transition: 0.2s; }
        .port-btn:hover { background: var(--accent-1); color: white; }

        /* === ANA İÇERİK ALANI === */
        #main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 20px; }
        
        /* === HEADER (Saat, Temalar, Dil) === */
        header { display: flex; justify-content: space-between; align-items: center; background: var(--bg-sec); padding: 15px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 20px; }
        .header-controls { display: flex; gap: 15px; align-items: center; }
        select, button { padding: 8px 12px; border-radius: 5px; border: 1px solid var(--border); background: var(--bg-main); color: var(--text-main); cursor: pointer; }
        button:hover { background: var(--accent-1); color: white; }
        #live-clock { font-family: monospace; font-size: 1.1rem; color: var(--accent-2); }

        /* === DASHBOARD GRID === */
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .card { background: var(--bg-sec); border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
        input[type="text"] { width: calc(100% - 20px); padding: 10px; margin-bottom: 10px; border: 1px solid var(--border); background: var(--bg-main); color: var(--text-main); border-radius: 5px; }
        
        /* === PROGRESS BAR === */
        .progress-wrapper { width: 100%; background: var(--bg-main); border-radius: 10px; height: 20px; margin-top: 15px; overflow: hidden; border: 1px solid var(--border); }
        .progress-bar { height: 100%; width: 0%; background: var(--accent-2); transition: width 0.4s ease; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: bold; color: white; }

        /* === TERMİNAL MODU === */
        #terminal { background: var(--terminal-bg); color: var(--terminal-text); font-family: 'Courier New', Courier, monospace; padding: 15px; border-radius: 8px; height: 250px; overflow-y: auto; border: 1px solid var(--border); margin-bottom: 20px; }
        .log-entry { margin-bottom: 5px; }
        .log-error { color: #ef4444; }
        .log-success { color: #22c55e; }

        /* === GÖRSELLEŞTİRME (SVG ve Grafikler) === */
        .viz-container { display: flex; justify-content: center; align-items: center; height: 200px; border: 1px dashed var(--border); margin-top: 15px; }
        .bar-chart { display: flex; align-items: flex-end; gap: 10px; height: 150px; }
        .bar { width: 40px; background: var(--accent-1); transition: height 0.5s; text-align: center; color: white; font-size: 0.8rem; display: flex; flex-direction: column; justify-content: flex-end; }

        /* === MODAL (Port Detayları) === */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; }
        .modal-content { background: var(--bg-sec); padding: 30px; border-radius: 8px; border: 1px solid var(--border); min-width: 400px; }
        .close-btn { float: right; cursor: pointer; font-weight: bold; color: #ef4444; }

    </style>
</head>
<body>

    <div id="sidebar">
        <h2 id="lang-quick-ports">Hızlı Portlar</h2>
        <button class="port-btn" onclick="setTargetPort('80,443')">🌐 Web (80, 443)</button>
        <button class="port-btn" onclick="setTargetPort('21,22,23')">💻 Yönetim (21,22,23)</button>
        <button class="port-btn" onclick="setTargetPort('3306,5432')">🗄️ Veritabanı</button>
        <button class="port-btn" onclick="setTargetPort('1-1000')">🔥 İlk 1000</button>
        <hr style="border-color: var(--border); margin: 15px 0;">
        <h2 id="lang-history">Geçmiş</h2>
        <div id="history-list" style="font-size: 0.9rem; overflow-y: auto; max-height: 200px;"></div>
    </div>

    <div id="main-content">
        <header>
            <div>
                <h1 style="color: var(--accent-1);">Signal-X</h1>
                <small id="lang-subtitle">Gelişmiş Ağ Güvenlik Denetimi</small>
            </div>
            <div class="header-controls">
                <span id="live-clock">00:00:00</span>
                <select id="theme-selector" onchange="changeTheme()">
                    <option value="dark">Dark Theme</option>
                    <option value="light">Light Theme</option>
                    <option value="hacker">Hacker Mode</option>
                    <option value="cyberpunk">Cyberpunk</option>
                    <option value="ocean">Ocean</option>
                </select>
                <button onclick="toggleLang()" id="lang-btn">TR / EN</button>
            </div>
        </header>

        <div class="grid-container">
            <div class="card">
                <h3 id="lang-scan-control">Tarama Kontrolü</h3>
                <input type="text" id="target-ip" placeholder="Hedef IP (örn: 127.0.0.1)">
                <input type="text" id="target-ports" placeholder="Portlar (örn: 80,443 veya 1-100)">
                <div style="display: flex; gap: 10px;">
                    <button onclick="startScan()" id="btn-start-scan" style="flex:1; background: var(--accent-2); color:white;">Taramayı Başlat</button>
                    <button onclick="runPing()" id="btn-ping" style="flex:1;">Ping Testi</button>
                </div>
                
                <div class="progress-wrapper">
                    <div class="progress-bar" id="scan-progress">0%</div>
                </div>
            </div>

            <div class="card">
                <h3 id="lang-results">Ağ Analizi ve Grafikler</h3>
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <button onclick="downloadCSV()" id="btn-csv">CSV İndir</button>
                    <button onclick="showNetworkMap()" id="btn-map">Ağ Haritası (SVG)</button>
                </div>
                <div class="viz-container" id="chart-container">
                    <div class="bar-chart" id="port-chart">
                        </div>
                </div>
            </div>
        </div>

        <div class="card" style="padding: 0;">
            <div style="padding: 10px; border-bottom: 1px solid var(--border); background: var(--bg-sec); display:flex; justify-content: space-between;">
                <strong id="lang-terminal">Terminal Çıktısı</strong>
                <button onclick="clearTerminal()" style="padding: 2px 8px;">Temizle</button>
            </div>
            <div id="terminal"></div>
        </div>
        
        <div class="card" id="svg-map-card" style="display: none; margin-bottom: 20px;">
            <h3>Ağ Topolojisi</h3>
            <div id="svg-container" style="text-align: center; margin-top: 15px;"></div>
        </div>

    </div>

    <div id="port-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">✖</span>
            <h2 id="modal-title">Port Detayları</h2>
            <div id="modal-body" style="margin-top: 15px; font-family: monospace;"></div>
        </div>
    </div>

    <script>
        // === STATE YÖNETİMİ ===
        let currentLang = 'tr';
        let isScanning = false;
        let scanResults = [];
        
        // === DİL SÖZLÜĞÜ ===
        const dict = {
            tr: {
                'lang-quick-ports': 'Hızlı Portlar', 'lang-history': 'Geçmiş',
                'lang-subtitle': 'Gelişmiş Ağ Güvenlik Denetimi', 'lang-scan-control': 'Tarama Kontrolü',
                'btn-start-scan': 'Taramayı Başlat', 'btn-ping': 'Ping Testi',
                'lang-results': 'Ağ Analizi ve Grafikler', 'btn-csv': 'CSV İndir',
                'btn-map': 'Ağ Haritası (SVG)', 'lang-terminal': 'Terminal Çıktısı'
            },
            en: {
                'lang-quick-ports': 'Quick Ports', 'lang-history': 'History',
                'lang-subtitle': 'Advanced Network Security Audit', 'lang-scan-control': 'Scan Control',
                'btn-start-scan': 'Start Scan', 'btn-ping': 'Ping Test',
                'lang-results': 'Network Analysis & Charts', 'btn-csv': 'Download CSV',
                'btn-map': 'Network Map (SVG)', 'lang-terminal': 'Terminal Output'
            }
        };

        // === CANLI SAAT ===
        setInterval(() => {
            const now = new Date();
            document.getElementById('live-clock').innerText = now.toLocaleTimeString('tr-TR');
        }, 1000);

        // === TEMA ve DİL İŞLEMLERİ ===
        function changeTheme() {
            const theme = document.getElementById('theme-selector').value;
            document.documentElement.setAttribute('data-theme', theme);
            logTerminal(`Tema değiştirildi: ${theme}`, 'success');
        }

        function toggleLang() {
            currentLang = currentLang === 'tr' ? 'en' : 'tr';
            for (let id in dict[currentLang]) {
                const el = document.getElementById(id);
                if(el) el.innerText = dict[currentLang][id];
            }
            logTerminal(`Dil değiştirildi: ${currentLang.toUpperCase()}`, 'success');
        }

        function setTargetPort(ports) {
            document.getElementById('target-ports').value = ports;
        }

        // === TERMİNAL FONKSİYONLARI ===
        function logTerminal(msg, type = 'info') {
            const term = document.getElementById('terminal');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type === 'error' ? 'log-error' : type === 'success' ? 'log-success' : ''}`;
            const time = new Date().toLocaleTimeString();
            entry.innerText = `[${time}] ${msg}`;
            term.appendChild(entry);
            term.scrollTop = term.scrollHeight;
        }

        function clearTerminal() { document.getElementById('terminal').innerHTML = ''; }

        // === PROGRESS BAR SİMÜLASYONU ===
        function simulateProgress(callback) {
            let prog = 0;
            const bar = document.getElementById('scan-progress');
            const interval = setInterval(() => {
                prog += Math.floor(Math.random() * 10) + 5;
                if (prog >= 100) {
                    prog = 100;
                    clearInterval(interval);
                    if(callback) callback();
                }
                bar.style.width = `${prog}%`;
                bar.innerText = `${prog}%`;
            }, 300);
        }

        // === API İSTEKLERİ (Axum'a gidecek) ===
        async function startScan() {
            if(isScanning) return;
            const ip = document.getElementById('target-ip').value || '127.0.0.1';
            const ports = document.getElementById('target-ports').value || '80,443';
            
            isScanning = true;
            document.getElementById('btn-start-scan').disabled = true;
            document.getElementById('scan-progress').style.width = '0%';
            logTerminal(`Tarama başlatılıyor: ${ip} [${ports}]...`, 'info');

            // Gerçek API isteği (Rust/Axum sunucusuna)
            try {
                // Simüle edilmiş bekleme süresi ve progress
                simulateProgress(async () => {
                    try {
                        const response = await fetch('/api/scan', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({ target_ip: ip, ports: ports })
                        });
                        
                        // Backend henüz hazır değilse mock data üret
                        if(!response.ok) throw new Error("API endpoint hazır değil");
                        const data = await response.json();
                        handleScanResults(data);
                    } catch (e) {
                        logTerminal(`API Bağlantı Hatası: Fallback mock verisi kullanılıyor.`, 'error');
                        generateMockData(ports);
                    }
                });
            } catch (err) {
                logTerminal(`Hata: ${err.message}`, 'error');
                isScanning = false;
                document.getElementById('btn-start-scan').disabled = false;
            }
        }

        function generateMockData(portsStr) {
            const portsArray = portsStr.split(',').map(p => parseInt(p.trim())).filter(p => !isNaN(p));
            scanResults = portsArray.map(p => ({
                port: p, 
                status: Math.random() > 0.5 ? 'open' : 'closed', 
                service: p === 80 ? 'HTTP' : p === 443 ? 'HTTPS' : 'Unknown'
            }));
            
            logTerminal(`Tarama tamamlandı. ${scanResults.length} port kontrol edildi.`, 'success');
            renderChart();
            saveHistory();
            
            isScanning = false;
            document.getElementById('btn-start-scan').disabled = false;
        }

        function handleScanResults(data) {
            scanResults = data.results || [];
            logTerminal(`Tarama başarıyla tamamlandı.`, 'success');
            renderChart();
            saveHistory();
            isScanning = false;
            document.getElementById('btn-start-scan').disabled = false;
        }

        // === PING TESTİ ===
        async function runPing() {
            const ip = document.getElementById('target-ip').value || '127.0.0.1';
            logTerminal(`Ping gönderiliyor: ${ip}...`);
            setTimeout(() => {
                const ms = Math.floor(Math.random() * 50) + 1;
                logTerminal(`Ping yanıtı alındı: ${ip} time=${ms}ms TTL=64`, 'success');
            }, 1000);
        }

        // === GRAFİK ÇİZİMİ (Bar Chart) ===
        function renderChart() {
            const container = document.getElementById('port-chart');
            container.innerHTML = '';
            
            const openCount = scanResults.filter(r => r.status === 'open').length;
            const closedCount = scanResults.length - openCount;

            const max = Math.max(openCount, closedCount, 1);
            
            const createBar = (label, count, color) => {
                const height = (count / max) * 100;
                const bar = document.createElement('div');
                bar.className = 'bar';
                bar.style.height = `${Math.max(height, 10)}%`;
                bar.style.backgroundColor = color;
                bar.innerHTML = `<span>${count}</span>`;
                bar.title = label;
                bar.onclick = () => showModal(`${label} Portlar`, `Toplam: ${count}`);
                container.appendChild(bar);
            };

            createBar('Açık', openCount, 'var(--accent-2)');
            createBar('Kapalı', closedCount, '#ef4444');
        }

        // === SVG AĞ HARİTASI ===
        function showNetworkMap() {
            const card = document.getElementById('svg-map-card');
            const container = document.getElementById('svg-container');
            card.style.display = 'block';
            
            const ip = document.getElementById('target-ip').value || '127.0.0.1';
            
            const svg = `
            <svg width="400" height="200" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="100" r="30" fill="var(--accent-1)" />
                <text x="50" y="105" fill="white" font-size="12" text-anchor="middle">Local</text>
                
                <line x1="80" y1="100" x2="320" y2="100" stroke="var(--border)" stroke-width="2" stroke-dasharray="5,5"/>
                
                <circle cx="350" cy="100" r="40" fill="var(--accent-2)" />
                <text x="350" y="100" fill="white" font-size="12" text-anchor="middle">Target</text>
                <text x="350" y="115" fill="white" font-size="10" text-anchor="middle">${ip}</text>
            </svg>`;
            
            container.innerHTML = svg;
            logTerminal('SVG Ağ haritası oluşturuldu.', 'info');
        }

        // === CSV İNDİRME ===
        function downloadCSV() {
            if(scanResults.length === 0) {
                logTerminal('İndirilecek veri yok. Önce tarama yapın.', 'error');
                return;
            }
            let csvContent = "data:text/csv;charset=utf-8,Port,Status,Service\n";
            scanResults.forEach(r => {
                csvContent += `${r.port},${r.status},${r.service}\n`;
            });
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "scan_results.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            logTerminal('CSV dosyası indirildi.', 'success');
        }

        // === LOCALSTORAGE (Geçmiş) ===
        function saveHistory() {
            const ip = document.getElementById('target-ip').value || '127.0.0.1';
            const time = new Date().toLocaleTimeString();
            let history = JSON.parse(localStorage.getItem('scanHistory')) || [];
            history.unshift(`${time} - ${ip}`);
            if(history.length > 10) history.pop();
            localStorage.setItem('scanHistory', JSON.stringify(history));
            loadHistory();
        }

        function loadHistory() {
            const history = JSON.parse(localStorage.getItem('scanHistory')) || [];
            const list = document.getElementById('history-list');
            list.innerHTML = '';
            history.forEach(item => {
                const div = document.createElement('div');
                div.style.padding = "5px 0";
                div.style.borderBottom = "1px solid var(--border)";
                div.innerText = item;
                list.appendChild(div);
            });
        }

        // === MODAL YÖNETİMİ ===
        function showModal(title, content) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-body').innerHTML = content;
            document.getElementById('port-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('port-modal').style.display = 'none';
        }

        // INIT
        window.onload = () => {
            loadHistory();
            logTerminal('Signal-X Frontend başarıyla yüklendi. Axum backend bekleniyor...', 'info');
        };
    </script>
</body>
</html>
