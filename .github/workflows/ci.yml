name: Signal-X CI

on:
  push:
    branches: [ "main", "midterm/yusuf-yilmaz" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build_and_test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
    - name: Kodu Klonla
      uses: actions/checkout@v4
      
    - name: Rust Toolchain Kurulumu
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy, rustfmt
        
    - name: Format Kontrolü (cargo fmt)
      run: cargo fmt -- --check
      
    - name: Kalite Kontrolü (cargo clippy)
      run: cargo clippy -- -D warnings
      
    - name: Projeyi Derle (cargo build)
      run: cargo build --verbose
      
    - name: Unit Testleri Çalıştır (cargo test)
      run: cargo test -p pentester --verbose
